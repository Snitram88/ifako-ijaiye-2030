<!DOCTYPE html>
<html lang="en">
<head>
  <!-- =========================
  SECTION: HEAD
  ========================= -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <style>
    /* =========================
    SECTION: PAGE LAYOUT
    ========================= */
    body {
      font-family: Arial, sans-serif;
      background: #08111f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: #111;
      padding: 40px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
    }

    h2 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      margin-bottom: 18px;
      border: none;
      border-radius: 6px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #00d084;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    #error {
      margin-top: 14px;
      color: #ff8b8b;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <!-- =========================
  SECTION: LOGIN FORM
  ========================= -->
  <div class="login-box">
    <h2>Admin Login</h2>

    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />

    <button onclick="login()">Login</button>

    <p id="error"></p>
  </div>

  <script>
    /* =========================
    SECTION: API BASE URL
    ========================= */
    const API_BASE = "https://ifako-ijaiye-2030.onrender.com";

    /* =========================
    SECTION: LOGIN FUNCTION
    ========================= */
    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorEl = document.getElementById("error");

      errorEl.innerText = "";

      try {
        const res = await fetch(API_BASE + "/api/admin/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.success) {
          localStorage.setItem("adminToken", data.token);
          window.location.href = "admin.html";
        } else {
          errorEl.innerText = data.message || "Invalid login";
        }
      } catch (error) {
        console.error(error);
        errorEl.innerText = "Could not connect to server";
      }
    }
  </script>
</body>
</html>
